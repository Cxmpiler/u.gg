<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Website HTML Viewer</title>
  <style>
    body { font-family: Arial; margin: 20px; }
    input { width: 500px; padding: 8px; }
    button { padding: 8px 12px; }
    pre {
      margin-top: 20px;
      padding: 10px;
      background: #f4f4f4;
      white-space: pre-wrap;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<h2>HTML Fetcher</h2>

<input id="url" placeholder="https://example.com">
<button onclick="loadPage()">Fetch HTML</button>

<pre id="output">Result will appear here...</pre>

<script>
async function loadPage() {
    const url = document.getElementById("url").value;

    // Your Cloudflare Worker proxy
    const proxy = "https://embedstuff.cxmplate.workers.dev/?url=" + encodeURIComponent(url);

    try {
        const res = await fetch(proxy);
        const text = await res.text();

        document.getElementById("output").textContent = text;
    } catch (err) {
        document.getElementById("output").textContent = "Error: " + err;
    }
}
</script>

</body>
</html>
