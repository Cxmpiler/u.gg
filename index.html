<style>
  /* Container for the iframe to prevent scrolling issues */
  body, html {
    margin: 0;
    padding: 0;
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #000;
  }

  /* The "Magnifying Glass" Trick */
  .iframe-wrapper {
    width: 100%;
    height: 100%;
    overflow: auto;
    -webkit-overflow-scrolling: touch; /* Smooth mobile scroll */
  }

  iframe {
    /* Step 1: Force Desktop Width */
    width: 1440px !important; 
    height: 300vh !important; /* Extra height for long build pages */
    
    border: none;

    /* Step 2: Shrink it to fit the phone screen */
    /* On most phones (approx 390px wide), 0.27 to 0.35 is the sweet spot */
    transform: scale(0.27); 
    transform-origin: 0 0;
    
    /* Ensure it doesn't try to be responsive */
    max-width: none !important;
  }
</style>

<div class="iframe-wrapper">
  <iframe src="https://embedstuff.cxmplate.workers.dev/?url=https://u.gg"></iframe>
</div>
