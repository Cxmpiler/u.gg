<!DOCTYPE html>
<html>
<head>
    <title>Project Workspace</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; background: #1a1c21; }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <!-- This attribute tells the library to strip security headers from u.gg -->
    <iframe is="x-frame-bypass" src="https://u.gg"></iframe>

    <!-- Required bypass scripts -->
    <script src="https://unpkg.com"></script>
    <script type="module" src="https://unpkg.com"></script>
</body>
</html>
